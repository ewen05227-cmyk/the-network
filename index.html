 <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPhone 17 Pro Max | Dynamic Island</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

        body {
            background-color: #000;
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 模拟 17 Pro Max 屏幕尺寸 */
        .iphone-frame {
            position: relative;
            width: 100%; max-width: 430px;
            height: 100%; max-height: 932px;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat;
            overflow: hidden;
            box-shadow: inset 0 0 0 8px #000, 0 0 50px rgba(255,255,255,0.1);
        }
        @media (min-width: 431px) {
            .iphone-frame { height: 90vh; border-radius: 55px; border: 4px solid #333; }
        }

        /* 锁屏界面元素 */
        .lock-screen-info {
            position: absolute; top: 100px; width: 100%;
            text-align: center; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: none; transition: opacity 0.3s;
        }
        .lock-time { font-size: 80px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
        .lock-date { font-size: 22px; font-weight: 500; opacity: 0.9; }

        /* ====== 核心：灵动岛 (Dynamic Island) ====== */
        .dynamic-island {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            background-color: #000;
            color: #fff;
            /* 极其Q弹的苹果级弹簧动画曲线 */
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* 默认状态尺寸 (极小药丸) */
            width: 120px;
            height: 35px;
            border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
        }

        /* 内部内容容器：默认全部透明/缩小，激活时放大显示 */
        .island-content {
            position: absolute; width: 100%; height: 100%;
            opacity: 0; pointer-events: none;
            transition: all 0.4s ease;
            box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* 状态 1：音乐播放器 */
        .island-music.active {
            width: 360px; height: 180px; border-radius: 44px;
        }
        .island-music.active .content-music { opacity: 1; pointer-events: auto; padding: 24px; transition-delay: 0.2s; }
        
        /* 状态 2：倒计时 */
        .island-timer.active {
            width: 360px; height: 80px; border-radius: 40px;
        }
        .island-timer.active .content-timer { opacity: 1; pointer-events: auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; transition-delay: 0.1s; }

        /* 状态 3：来电提醒 */
        .island-call.active {
            width: 360px; height: 100px; border-radius: 45px;
        }
        .island-call.active .content-call { opacity: 1; pointer-events: auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; transition-delay: 0.1s; }

        /* 状态 4：收起时的两端小图标 (如听歌时的小波纹) */
        .mini-status {
            position: absolute; width: 100%; padding: 0 12px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .mini-status.active { opacity: 1; }
        .audio-wave { display: flex; gap: 2px; height: 12px; align-items: flex-end; }
        .audio-wave div { width: 3px; background: #FF3B30; border-radius: 2px; animation: bounce 0.6s infinite alternate; }
        .audio-wave div:nth-child(2) { animation-delay: 0.2s; }
        .audio-wave div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0% { height: 3px; } 100% { height: 12px; } }

        /* ====== 控制台 (模拟发通知) ====== */
        .debug-panel {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; z-index: 50;
        }
        .debug-btn {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            color: white; border: none; padding: 12px 20px; border-radius: 25px;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .debug-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
        .debug-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="iphone-frame">
        
        <div class="lock-screen-info" id="lock-info">
            <div class="lock-date">5月11日 星期一</div>
            <div class="lock-time">16:50</div>
        </div>

        <div class="dynamic-island" id="island" onclick="toggleIsland()">
            
            <div class="mini-status" id="mini-status">
                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=50&h=50&fit=crop" class="w-6 h-6 rounded-full opacity-80">
                <div class="audio-wave"><div></div><div></div><div></div></div>
            </div>

            <div class="island-content content-music" id="content-music">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&h=100&fit=crop" class="w-16 h-16 rounded-2xl shadow-lg">
                    <div class="flex-1">
                        <div class="text-white font-bold text-lg">Starboy</div>
                        <div class="text-gray-400 text-sm">The Weeknd / Daft Punk</div>
                    </div>
                    <div class="audio-wave"><div></div><div></div><div></div></div>
                </div>
                <div class="flex justify-center items-center gap-8 mt-4">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M11 5v14l-8-7zM22 5v14l-8-7z"/></svg>
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M13 5v14l8-7zM2 5v14l8-7z"/></svg>
                </div>
            </div>

            <div class="island-content content-timer" id="content-timer">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full border-4 border-[#FF9F0A] flex items-center justify-center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF9F0A" stroke-width="3"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <div class="text-[#FF9F0A] font-bold text-xl tracking-wider">Timer</div>
                </div>
                <div class="text-4xl font-light tracking-tight text-[#FF9F0A]">12:45</div>
            </div>

            <div class="island-content content-call" id="content-call">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-gray-700 flex justify-center items-center text-xl">👤</div>
                    <div>
                        <div class="text-gray-400 text-xs font-bold uppercase mb-1">iPhone</div>
                        <div class="text-white font-bold text-lg">Boss Calling...</div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="w-12 h-12 rounded-full bg-[#FF3B30] flex justify-center items-center cursor-pointer hover:scale-110 transition">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white" transform="rotate(135)"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-[#34C759] flex justify-center items-center cursor-pointer hover:scale-110 transition" onclick="alert('通话已接通')">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </div>
                </div>
            </div>

        </div>

        <div class="debug-panel">
            <button class="debug-btn" onclick="triggerIsland('music')">🎵 Apple Music</button>
            <button class="debug-btn" onclick="triggerIsland('timer')">⏱️ 开启倒计时</button>
            <button class="debug-btn" onclick="triggerIsland('call')">📞 模拟来电</button>
            <button class="debug-btn" onclick="resetIsland()">✖️ 收起灵动岛</button>
        </div>

    </div>

    <script>
        const island = document.getElementById('island');
        const lockInfo = document.getElementById('lock-info');
        const miniStatus = document.getElementById('mini-status');
        let currentState = 'none'; // 'music', 'timer', 'call', 'none'
        let isExpanded = false;

        // 触发某个特定的状态 (比如收到推送)
        function triggerIsland(type) {
            currentState = type;
            isExpanded = true;
            updateIslandUI();
        }

        // 手指点击灵动岛本体：在收起和展开之间切换
        function toggleIsland() {
            if (currentState === 'none') return; // 如果没有任何后台任务，点它没反应
            isExpanded = !isExpanded;
            updateIslandUI();
        }

        // 彻底复位
        function resetIsland() {
            currentState = 'none';
            isExpanded = false;
            updateIslandUI();
        }

        // 核心渲染引擎
        function updateIslandUI() {
            // 1. 清除所有类名
            island.className = 'dynamic-island';
            miniStatus.classList.remove('active');
            
            // 2. 根据状态和展开情况赋予新类名
            if (isExpanded) {
                // 展开大卡片
                if(currentState === 'music') island.classList.add('island-music', 'active');
                if(currentState === 'timer') island.classList.add('island-timer', 'active');
                if(currentState === 'call') island.classList.add('island-call', 'active');
                
                // 锁屏时间变暗淡出
                lockInfo.style.opacity = '0.1';
                lockInfo.style.transform = 'translateY(20px) scale(0.95)';
            } else {
                // 回到原始的小黑条
                lockInfo.style.opacity = '1';
                lockInfo.style.transform = 'translateY(0) scale(1)';

                // 如果后台还有任务（比如正在切歌），显示两端的迷你图标
                if (currentState === 'music') {
                    miniStatus.classList.add('active');
                }
            }
        }
    </script>
</body>
</html>
